<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Card · Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4 sm:p-8">

  <article class="bg-white rounded-2xl shadow-sm p-4 sm:p-8 flex flex-col gap-4 w-full max-w-3xl">

    <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-1 sm:gap-4">
      <h2 class="text-xl sm:text-2xl font-semibold text-gray-900">Менеджер з продажу Call tracking (B2B)</h2>
      <span class="text-sm sm:text-lg text-gray-500 whitespace-nowrap">15 годин тому</span>
    </div>

    <div class="flex flex-wrap items-center gap-x-8 gap-y-2">
      <div class="flex items-center gap-2">
        <span>💼</span>
        <span class="text-base sm:text-lg text-gray-900">Akvarel</span>
      </div>
      <div class="flex items-center gap-2">
        <span>📍</span>
        <span class="text-base sm:text-lg text-gray-900">Львів</span>
      </div>
    </div>

    <div class="flex items-center gap-2 flex-wrap">
      <span class="bg-gray-100 rounded-full px-3 h-7 sm:h-8 flex items-center text-sm sm:text-base text-gray-900">Наявність пандуса</span>
      <span class="bg-gray-100 rounded-full px-3 h-7 sm:h-8 flex items-center text-sm sm:text-base text-gray-900">З генератором</span>
      <span class="bg-gray-100 rounded-full px-3 h-7 sm:h-8 flex items-center text-sm sm:text-base text-gray-900">Психологічна підтримка</span>
      <span class="bg-gray-100 rounded-full px-3 h-7 sm:h-8 flex items-center text-sm sm:text-base text-gray-900">З укриттям</span>
      <span class="border border-gray-200 rounded-full px-3 h-7 sm:h-8 flex items-center text-sm sm:text-base text-gray-900">+5</span>
    </div>

    <hr class="border-gray-200" />

    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div class="flex items-baseline gap-2">
        <span class="text-xl sm:text-2xl text-gray-900">24 000 - 32 000</span>
        <span class="text-base sm:text-lg text-gray-500">грн</span>
      </div>
      <div class="flex items-center gap-3">
        <button class="size-8 flex items-center justify-center text-xl text-gray-400 hover:text-gray-600 shrink-0">♡</button>
        <button class="flex-1 sm:flex-none border border-gray-900 rounded-lg px-6 py-3 text-base sm:text-lg font-medium text-gray-900 hover:bg-gray-900 hover:text-white transition-all">
          Детальніше
        </button>
      </div>
    </div>

  </article>

</div>

</body>
</html>
